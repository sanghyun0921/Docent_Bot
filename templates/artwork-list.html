<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>작품 선택</title>
    <!-- 외부 라이브러리 -->
    <!-- data.js를 먼저 부르고, 그 다음에 guide.js를 부릅니다 -->
    <script src="{{ url_for('static', filename='js/data.js') }}"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- 전용 스타일 및 스크립트 (Flask 경로 적용) -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/artwork-list.css') }}"
    />
    <script
      src="{{ url_for('static', filename='js/artwork-list.js') }}"
      defer
    ></script>
  </head>
  <body
    class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex flex-col items-center justify-center p-8"
  >
    <div
      class="bg-white rounded-3xl shadow-2xl p-12 max-w-4xl w-full max-h-[90vh] flex flex-col"
    >
      <div class="mb-6">
        <h1 class="text-3xl font-bold text-gray-800 mb-4">작품 선택</h1>
        <div class="relative">
          <i
            data-lucide="search"
            class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 w-6 h-6"
          ></i>
          <input
            type="text"
            id="search-input"
            placeholder="작품명(별이 빛나는 밤), 작가명(고흐), 장르(인상주의)로 검색..."
            class="pl-12 h-14 text-lg w-full rounded-md border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <p class="text-sm text-gray-500 mt-2 ml-1">
          예: '파블로', '고흐', '추상화' 등을 입력해보세요.
        </p>
      </div>

      <!-- 작품 목록 영역 -->
      <div class="flex-1 overflow-y-auto mb-6 space-y-4" id="artwork-list">
        <!-- 리스트가 비었을 때의 기본 메시지는 JS에서 처리합니다 -->
      </div>

      <!-- 버튼 영역 -->
      <div class="space-y-3">
        <div class="grid grid-cols-2 gap-4">
          <!-- 1. 선택 완료 버튼 -->
          <button
            onclick="selectArtwork()"
            class="flex items-center justify-center h-16 text-xl bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-semibold"
          >
            <i data-lucide="check-circle-2" class="mr-2 w-6 h-6"></i> 선택 완료
          </button>

          <!-- 2. 음성 명령 버튼 추가 -->
          <button
            onclick="
              location.href =
                'listening.html?from=list&courseId=' +
                getQueryParam('courseId') +
                '&progress=' +
                getQueryParam('progress')
            "
            class="flex items-center justify-center h-16 text-xl border-2 border-gray-300 bg-white text-gray-700 rounded-lg hover:bg-gray-50 transition-colors font-semibold"
          >
            <i data-lucide="mic" class="mr-2 w-6 h-6"></i> 음성 명령
          </button>
        </div>

        <!-- 3. 뒤로가기 버튼 -->
        <button
          onclick="goBack()"
          class="flex items-center justify-center w-full h-14 text-lg border-2 border-gray-300 bg-white text-gray-700 rounded-lg hover:bg-gray-50 transition-colors font-semibold"
        >
          <i data-lucide="arrow-left" class="mr-2 w-6 h-6"></i> 뒤로가기
        </button>
      </div>
    </div>
  </body>
</html>
