<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>음성 인식</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
  <!-- static 폴더의 CSS 연결 -->
  <script src="{{ url_for('static', filename='js/data.js') }}"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/listening.css') }}" />
  <script src="{{ url_for('static', filename='js/listening.js') }}" defer></script>
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-8">
  <div class="bg-white rounded-3xl shadow-2xl p-12 max-w-lg w-full text-center">
    <div class="mb-8">
      <div class="flex justify-center mb-6">
        <!-- 상태에 따라 bg-red-500(인식중) / bg-blue-500(완료) 등으로 바뀜 -->
        <div id="listening-icon-container" class="p-8 rounded-full transition-all duration-500">
          <i id="listening-icon" data-lucide="mic" class="text-white" style="width: 80px; height: 80px"></i>
        </div>
      </div>

      <h1 id="listening-title" class="text-3xl font-bold text-gray-800 mb-4">
        명령 대기 중
      </h1>

      <!-- 1. 듣는 중일 때 표시되는 애니메이션 -->
      <div id="listening-status" class="hidden">
        <div class="space-y-3">
          <p class="text-xl text-gray-600 font-medium">말씀해 주세요...</p>
          <div class="flex justify-center gap-2">
            <div class="w-3 h-3 bg-red-500 rounded-full animate-bounce"></div>
            <div class="w-3 h-3 bg-red-500 rounded-full animate-bounce" style="animation-delay: 150ms"></div>
            <div class="w-3 h-3 bg-red-500 rounded-full animate-bounce" style="animation-delay: 300ms"></div>
          </div>
        </div>
      </div>

      <!-- 2. 인식 완료 후 결과 표시 영역 -->
      <div id="listening-result" class="hidden">
        <div class="bg-blue-50 border-2 border-blue-200 rounded-2xl p-6 mb-6">
          <!-- hidden 클래스를 추가하여 텍스트 내용이 보이지 않게 함 -->
          <p id="recognized-text" class="text-xl text-gray-700 font-bold break-words"></p>
          <p id="action-msg" class="text-xl text-blue-600 font-bold mt-2"></p>
        </div>
      </div>

      <div class="space-y-4">
        <!-- 다시 말하기 버튼 -->
        <button id="retry-btn" onclick="retryListening()"
          class="hidden w-full h-16 text-xl bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold flex items-center justify-center transition-all shadow-lg">
          <i data-lucide="mic" class="mr-3 w-7 h-7"></i> 다시 말하기
        </button>

        <!-- 닫기 버튼 -->
        <button onclick="goBack()"
          class="w-full h-16 text-xl border-2 border-gray-300 hover:bg-gray-50 text-gray-700 rounded-xl font-bold bg-white transition-all">
          닫기
        </button>
      </div>

      <!-- 하단 도움말 (문맥에 따라 내용이 바뀜) -->
      <div class="mt-8 p-6 bg-blue-50 rounded-xl text-left border border-blue-100">
        <p class="text-sm text-blue-600 mb-3 font-bold">도움말:</p>
        <ul id="help-list" class="text-sm text-gray-600 space-y-2 font-medium">
          <!-- JS에서 동적으로 생성 -->
        </ul>
      </div>
    </div>
</body>

</html>
