<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Museum Guide Bot Admin</title>

    <!-- 분리된 CSS 연결 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/analytics.css') }}">

    <!-- Chart.js 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">Museum Guide</div>
                <div class="sidebar-subtitle">Control Panel</div>
            </div>
            <nav class="sidebar-nav">
                <a href="/admin">
                    <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" /><rect x="14" y="14" width="7" height="7" /><rect x="3" y="14" width="7" height="7" /></svg>
                    Dashboard
                </a>
                <a href="/slam">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /><circle cx="12" cy="12" r="3" /></svg>
                    SLAM Mapping
                </a>
                <a href="/map-editor">
                    <svg class="icon" viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6" /><line x1="8" y1="2" x2="8" y2="18" /><line x1="16" y1="6" x2="16" y2="22" /></svg>
                    Map Editor
                </a>
                <a href="/analytics" class="active">
                    <svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10" /><line x1="12" y1="20" x2="12" y2="4" /><line x1="6" y1="20" x2="6" y2="14" /></svg>
                    Analytics
                </a>
                <hr style="border:0; border-top:1px solid var(--border-color); margin: 20px 0; opacity: 0.3;">
                <a href="/">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Go to Service
                </a>
            </nav>
            <div class="sidebar-footer">© 2026 Museum Guide Bot</div>
        </aside>

        <div class="main-content">
            <header class="header">
                <div>
                    <h1 class="header-title">Analytics</h1>
                    <p style="font-size: 14px; margin-top: 4px; color: #9ca3af;">로봇 가이드 투어 분석 데이터</p>
                </div>
                <div id="last-update-time" class="summary-change">데이터를 불러오는 중...</div>
            </header>

            <main class="content">
                <!-- 1. 요약 카드 섹션 (4개 카드로 확장) -->
                <div class="summary-grid">
                    <!-- 카드 1: 오늘 총 관람객 -->
                    <div class="summary-card">
                        <div class="summary-icon bg-blue">
                            <svg class="icon-lg text-blue" viewBox="0 0 24 24">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                                <circle cx="9" cy="7" r="4" />
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                                <path d="M16 3.19a4 4 0 0 1 0 7.75" />
                            </svg>
                        </div>
                        <div class="summary-content">
                            <div class="summary-label">누적 총 관람객 수</div>
                            <div id="total-visitor-val" class="summary-value">--</div>
                        </div>
                    </div>

                    <!-- 카드 2: 몰입도 1위 -->
                    <div class="summary-card">
                        <div class="summary-icon bg-green">
                            <svg class="icon-lg text-green" viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="10" />
                                <polyline points="12 6 12 12 16 14" />
                            </svg>
                        </div>
                        <div class="summary-content">
                            <div class="summary-label">누적 관람 시간 1위</div>
                            <div id="best-engagement-art" class="summary-value" style="font-size: 20px;">--</div>
                            <div id="best-engagement-time" class="summary-change">--</div>
                        </div>
                    </div>

                    <!-- 카드 3: 실시간 트렌딩 (최근 1시간) -->
                    <div class="summary-card">
                        <div class="summary-icon bg-orange">
                            <svg class="icon-lg text-orange" viewBox="0 0 24 24">
                                <path d="M23 6l-9.5 9.5-5-5L1 18" />
                                <path d="M17 6h6v6" />
                            </svg>
                        </div>
                        <div class="summary-content">
                            <div class="summary-label">최근 1시간 인기작</div>
                            <div id="trending-art-val" class="summary-value" style="font-size: 20px;">--</div>
                            <div id="trending-count" class="summary-change">집계 중</div>
                        </div>
                    </div>

                    <!-- 카드 4: 미술관 혼잡도 -->
                    <div class="summary-card">
                        <div class="summary-icon bg-purple">
                            <svg class="icon-lg text-purple" viewBox="0 0 24 24">
                                <path
                                    d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H3zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm9 4s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1h-10zm7-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />
                            </svg>
                        </div>
                        <div class="summary-content">
                            <div class="summary-label">현재 미술관 혼잡도</div>
                            <div id="congestion-level-val" class="summary-value">--</div>
                            <div id="recent-total-visitors" class="summary-change">분석 중</div>
                        </div>
                    </div>
                </div>

                <!-- 2. 차트 섹션 -->
                <div class="charts-grid">
                    <!-- 작품별 인원수 비중 -->
                    <div class="chart-card">
                        <h2 class="chart-title">작품별 관람객 수 비중 (인원수)</h2>
                        <div class="chart-container">
                            <canvas id="visitorChart"></canvas>
                        </div>
                    </div>

                    <!-- 작품별 누적 관람 시간 -->
                    <div class="chart-card">
                        <h2 class="chart-title">작품별 누적 관람 시간 비교</h2>
                        <div class="chart-container">
                            <canvas id="timeBarChart"></canvas>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- JS 연결 -->
    <script src="{{ url_for('static', filename='js/analytics.js') }}"></script>
</body>

</html>
